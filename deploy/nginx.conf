events {}

http {

    server {
        listen 80;

        # ========================
        # 前端静态资源
        # ========================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # ========================
        # API 转发给 Java Agent
        # ========================
        location /chat/ {
            proxy_pass http://agent_blue:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}