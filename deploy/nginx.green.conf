events {}

http {
  upstream agent_upstream {
    server agent_green:8080;
    keepalive 64;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://agent_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}