version: "3.9"

networks:
  frontend_net:
  backend_net:

volumes:
  neo4j_data:
  minio_data:
  milvus_data:
  etcd_data:
  ollama_data:

services:
  # =============================
  # 🌐 Nginx Gateway (LB)
  # =============================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      # 可以先固定用 nginx.conf（指向 agent）
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent_blue
      - agent_green
    networks:
      - frontend_net
      - backend_net
    restart: always

  agent_blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_blue
    environment:
      SPRING_PROFILES_ACTIVE: prd
      TZ: Asia/Shanghai
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
    ports:
      - "8081:8080"
    depends_on:
      - neo4j
      - milvus
      - ollama
      - ollama-init
    networks:
      - backend_net
    restart: always

  agent_green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_green
    environment:
      SPRING_PROFILES_ACTIVE: prd
      TZ: Asia/Shanghai
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
    ports:
      - "8082:8080"
    depends_on:
      - neo4j
      - milvus
      - ollama
      - ollama-init
    networks:
      - backend_net
    restart: always

  # =============================
  # 🧪 Agent Health Sidecar（健康裁判）
  # =============================
  agent-health:
    image: curlimages/curl:8.6.0
    container_name: agent-health
    depends_on:
      - agent_blue
      - agent_green
    command: >
      sh -lc "
      echo 'health watcher start';
      while true; do
        curl -fsS http://agent_blue:8080/actuator/health | grep -q 'UP' \
          && echo '[OK] agent_blue UP' \
          || echo '[WARN] agent_blue not ready';
        curl -fsS http://agent_green:8080/actuator/health | grep -q 'UP' \
          && echo '[OK] agent_green UP' \
          || echo '[WARN] agent_green not ready';
        sleep 5;
      done"
    networks:
      - backend_net
    restart: always

  # =============================
  # 🧠 Ollama Runtime
  # =============================
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: always

  # =============================
  # 🧠 Ollama Init（一次性拉模型）
  # =============================
  ollama-init:
    image: ollama/ollama
    container_name: ollama-init
    depends_on:
      - ollama
    command: >
      sh -lc "
      sleep 3;
      ollama pull nomic-embed-text;
      echo '✅ nomic-embed-text ready';
      "
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: "no"

  # =============================
  # 🧠 Neo4j
  # =============================
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - backend_net
    restart: always

  # =============================
  # 📦 Milvus Stack
  # =============================
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    networks:
      - backend_net
    restart: always

  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    networks:
      - backend_net
    restart: always

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - backend_net
    restart: always