version: "3.9"

services:

  # ======================
  # ETCD
  # ======================
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd
    restart: always

  # ======================
  # MINIO
  # ======================
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    restart: always

  # ======================
  # MILVUS
  # ======================
  milvus:
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    restart: always

  # ======================
  # NEO4J
  # ======================
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/12345678
    ports:
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: always

  # ======================
  # 🔥 OLLAMA SIDECAR
  # ======================
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

  # ======================
  # AGENT
  # ======================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - neo4j
      - milvus
      - ollama
    environment:
      SPRING_PROFILES_ACTIVE: prd

      OPENAI_API_KEY: ${OPENAI_API_KEY}

      MILVUS_HOST: milvus
      NEO4J_URI: bolt://neo4j:7687

      # 🔥 关键：直接连 sidecar
      OLLAMA_BASE_URL: http://ollama:11434

    ports:
      - "8080:8080"
    restart: always

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  ollama_data: