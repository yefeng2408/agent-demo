name: agent-stack

networks:
  frontend_net:
    name: agent-stack_frontend_net
  backend_net:
    name: agent-stack_backend_net

volumes:
  neo4j_data:
  minio_data:
  milvus_data:
  etcd_data:
  ollama_data:

services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend_net
      - backend_net
    restart: always

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: always

  ollama-init:
    image: ollama/ollama
    container_name: ollama-init
    depends_on:
      - ollama
    command: >
      sh -lc "
      sleep 3;
      ollama pull nomic-embed-text;
      echo 'nomic-embed-text ready';
      "
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: "no"

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - backend_net
    restart: always

  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    networks:
      - backend_net
    restart: always

  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    networks:
      - backend_net
    restart: always

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - backend_net
    restart: always