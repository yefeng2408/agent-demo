version: "3.9"

services:

  # ======================
  # 🔥 Java Agent API
  # ======================
  agent_blue:
    image: eclipse-temurin:21.0.5_11-jre
    container_name: agent_blue
    volumes:
      - ./deploy/jars/blue/app.jar:/app/app.jar
    command: ["java","-jar","/app/app.jar"]
    networks:
      - backend_net
    restart: always

  # ======================
  # 🔥 Frontend Nginx
  # ======================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - agent_blue
    networks:
      - backend_net
      - frontend_net
    restart: always

  # ======================
  # Ollama
  # ======================
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - backend_net
    restart: always

  # ======================
  # Neo4j
  # ======================
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/Neo4j@2026!
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - backend_net
    restart: always

  # ======================
  # Minio
  # ======================
  minio:
    image: minio/minio
    container_name: minio
    command: ["server","/data"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
    networks:
      - backend_net
    restart: always

  # ======================
  # etcd
  # ======================
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    networks:
      - backend_net
    restart: always

  # ======================
  # Milvus
  # ======================
  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus
    command: ["milvus","run","standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio123
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - backend_net
    restart: always

networks:
  backend_net:
  frontend_net: