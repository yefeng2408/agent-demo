name: build-and-deploy

on:
  push:
    branches:
      - agent_mermory_release

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yefeng2408/agent-demo:latest
            yefeng2408/agent-demo:${{ steps.meta.outputs.tag }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/agent-prod

            # 写入 tag（让 compose 用最新 SHA）
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ steps.meta.outputs.tag }}/" .env || true
            if ! grep -q "^IMAGE_TAG=" .env; then echo "IMAGE_TAG=${{ steps.meta.outputs.tag }}" >> .env; fi

            docker compose pull agent
            docker compose up -d
            docker image prune -f
            docker compose ps
