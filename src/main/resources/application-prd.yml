#      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  application:
    name: agent
#  datasource:
#    url: jdbc:mysql://localhost:3306/act5?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#    username: root
#    password: yefeng
#    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    # 关键：指定哪个 provider 负责 chat / embedding
    model:
      chat: openai
      embedding: ollama

    # Chat -> DeepSeek（OpenAI 兼容）
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.2

    # Embedding -> Ollama（本地）
    ollama:
      base-url: http://ollama:11434
      embedding:
        options:
          model: nomic-embed-text

    # Milvus VectorStore
    vectorstore:
      milvus:
        uri: milvus:19530
        collection-name: vector_store
        database-name: default
        embedding-field-name: vector
        token: ""

neo4j:
  uri: bolt://neo4j:7687
  username: ${NEO4J_USERNAME}
  password: ${NEO4J_PASSWORD}
  encrypted: false

#migration:
#  enabled: true
#  batchSize: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
milvus:
  host: milvus


logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client.RestClient: DEBUG