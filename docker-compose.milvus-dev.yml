version: "3.8"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    command: >
      etcd
      --data-dir=/etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
    volumes:
      - ./etcd/data:/etcd
    networks:
      - agent_net

  storage:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    command: server /data
    volumes:
      - ./minio/data:/data
    ports:
      - "9000:9000"          # MinIO API / Console
    networks:
      - agent_net



  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./milvus/data:/var/lib/milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: storage:9000
      MILVUS_GRPC_BIND_ADDRESS: 0.0.0.0
    depends_on:
      - etcd
      - storage
    networks:
      - agent_net

  attu:
    image: zilliz/attu:v2.4.8
    container_name: milvus-attu
    ports:
      - "8000:3000"
    environment:
      # ⚠️ 这是关键：容器内通过 service name 访问
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge